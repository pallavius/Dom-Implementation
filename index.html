<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Greeting Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #f4f4f4;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .color-boxes {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .box {
      width: 100px;
      height: 100px;
      line-height: 100px;
      border: 2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      text-transform: capitalize;
      background-color: white;
      transition: 0.3s;
    }

    input {
      padding: 10px;
      font-size: 1rem;
      width: 200px;
      margin-right: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1 id="greeting">Hello</h1>

  <div class="color-boxes">
    <div class="box" id="red">red</div>
    <div class="box" id="blue">blue</div>
    <div class="box" id="green">green</div>
    <div class="box" id="yellow">yellow</div>
  </div>

  <input type="text" id="nameInput" placeholder="Enter your name" />
  <button onclick="greetUser()">Greet</button>

  <script>
    // Function to update greeting text
    function greetUser() {
      const name = document.getElementById("nameInput").value;
      const greeting = document.getElementById("greeting");

      if (name.trim() !== "") {
        greeting.textContent = "Hello, " + name;
      } else {
        greeting.textContent = "Hello";
      }
    }

    // Function to set background color of a box
    function fillColor(event) {
      const color = event.target.id;
      event.target.style.backgroundColor = color;
      event.target.style.color = "white";
    }

    // Attach click event to all boxes
    const boxes = document.getElementsByClassName("box");
    for (let box of boxes) {
      box.addEventListener("click", fillColor);
    }
  </script>

</body>
</html>
